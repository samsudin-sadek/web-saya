<!DOCTYPE html>
<html>
<head>
    <title>Mini Project Web</title>
<link rel="stylesheet" href="css/style.css">
   
</head>
<body>

<div class="container">

    <h1>Mini Web App 🚀</h1>

    <!-- INPUT NAMA -->
    <div class="section">
        <h2>Masukkan Nama</h2>
        <input type="text" id="namaInput" placeholder="Ketik nama...">
        <button onclick="tampilkanNama()">Tampilkan</button>
        <p id="hasilNama"></p>
    </div>

    <!-- TODO HOBI -->
    <div class="section">
        <h2>Daftar Hobi</h2>
        <input type="text" id="hobiInput" placeholder="Masukkan hobi">
        <button onclick="tambahHobi()">Tambah</button>
        <ul id="listHobi"></ul>
         <button onclick="hapusSemua()">Hapus Semua</button>
    </div>
<div class="section">
    <h2>Data User (API)</h2>

    <input type="text" id="searchInput" placeholder="Cari user...">

    <p id="loading">Loading...</p>
    <p id="error" style="color:red;"></p>

    <ul id="dataUser"></ul>
   
</div>
</div>

<script src="js/script.js"></script>
</body>
</html>
